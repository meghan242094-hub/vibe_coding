<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Megha's professional portfolio – Frontend Developer specializing in React.js, JavaScript, and modern web experiences.">
    <title>Megha | Frontend Developer Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#1e40af',
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 3px; }
        .skill-bar { transition: width 1.5s ease-in-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .float-anim { animation: float 3s ease-in-out infinite; }
        @keyframes gradient-x {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .gradient-animate {
            background-size: 200% 200%;
            animation: gradient-x 4s ease infinite;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── HEADER ──────────────────────────────────────────────────────────────
        function Header() {
            const [menuOpen, setMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            const navLinks = [
                { label: 'About', href: '#about' },
                { label: 'Skills', href: '#skills' },
                { label: 'Experience', href: '#experience' },
                { label: 'Projects', href: '#projects' },
                { label: 'Contact', href: '#contact' },
            ];

            return (
                <header className={`fixed top-0 left-0 w-full z-50 transition-all duration-500 ${
                    scrolled ? 'bg-gray-900/95 backdrop-blur-xl shadow-xl shadow-blue-900/10 border-b border-gray-800/50' : 'bg-transparent'
                }`}>
                    <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                        {/* Logo */}
                        <a href="#hero" className="text-2xl font-black tracking-tight group">
                            <span className="text-white group-hover:text-blue-400 transition-colors">{'<'}</span>
                            <span className="bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Megha</span>
                            <span className="text-white group-hover:text-blue-400 transition-colors">{'/>'}</span>
                        </a>

                        {/* Desktop Nav */}
                        <nav className="hidden md:flex items-center gap-8">
                            {navLinks.map(link => (
                                <a key={link.label} href={link.href}
                                    className="text-gray-400 hover:text-white font-medium text-sm transition-all duration-200 relative group py-1">
                                    {link.label}
                                    <span className="absolute bottom-0 left-0 w-0 h-0.5 bg-gradient-to-r from-blue-400 to-indigo-400 transition-all duration-300 group-hover:w-full rounded-full"></span>
                                </a>
                            ))}
                            <a href="#contact"
                                className="ml-2 px-5 py-2.5 rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white text-sm font-bold hover:from-blue-400 hover:to-indigo-500 transition-all duration-300 shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:-translate-y-0.5">
                                Hire Me
                            </a>
                        </nav>

                        {/* Mobile Hamburger */}
                        <button className="md:hidden w-10 h-10 flex items-center justify-center rounded-lg bg-gray-800 text-white hover:bg-gray-700 transition-colors"
                            onClick={() => setMenuOpen(!menuOpen)} aria-label="Toggle menu">
                            <i className={`fas ${menuOpen ? 'fa-times' : 'fa-bars'} text-lg`}></i>
                        </button>
                    </div>

                    {/* Mobile Menu */}
                    {menuOpen && (
                        <div className="md:hidden bg-gray-900/98 backdrop-blur-xl border-t border-gray-800 px-6 pb-6 pt-4 flex flex-col gap-2">
                            {navLinks.map(link => (
                                <a key={link.label} href={link.href}
                                    onClick={() => setMenuOpen(false)}
                                    className="text-gray-300 hover:text-white font-medium text-base py-3 px-4 rounded-lg hover:bg-gray-800 transition-all">
                                    {link.label}
                                </a>
                            ))}
                            <a href="#contact" onClick={() => setMenuOpen(false)}
                                className="mt-2 px-5 py-3 rounded-full text-center bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold hover:from-blue-400 hover:to-indigo-500 transition-all">
                                Hire Me
                            </a>
                        </div>
                    )}
                </header>
            );
        }

        // ─── HERO ────────────────────────────────────────────────────────────────
        function Hero() {
            const roles = ['Frontend Developer', 'React.js Specialist', 'UI/UX Enthusiast', 'Full Stack Developer'];
            const [roleIndex, setRoleIndex] = useState(0);
            const [displayed, setDisplayed] = useState('');
            const [typing, setTyping] = useState(true);

            useEffect(() => {
                const current = roles[roleIndex];
                if (typing && displayed.length === current.length) {
                    const t = setTimeout(() => setTyping(false), 2000);
                    return () => clearTimeout(t);
                }
                if (!typing && displayed.length === 0) {
                    setRoleIndex(prev => (prev + 1) % roles.length);
                    setTyping(true);
                    return;
                }
                const speed = typing ? 75 : 35;
                const t = setTimeout(() => {
                    setDisplayed(typing ? current.slice(0, displayed.length + 1) : current.slice(0, displayed.length - 1));
                }, speed);
                return () => clearTimeout(t);
            }, [displayed, typing, roleIndex]);

            return (
                <section id="hero" className="relative min-h-screen flex items-center justify-center bg-gray-950 overflow-hidden">
                    {/* Background orbs */}
                    <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl animate-pulse pointer-events-none"></div>
                    <div className="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-indigo-600/10 rounded-full blur-3xl animate-pulse pointer-events-none" style={{animationDelay:'1.5s'}}></div>
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[700px] h-[700px] bg-violet-900/5 rounded-full blur-3xl pointer-events-none"></div>

                    {/* Grid dots overlay */}
                    <div className="absolute inset-0 opacity-[0.03] pointer-events-none"
                        style={{backgroundImage: 'radial-gradient(circle, #60a5fa 1px, transparent 1px)', backgroundSize: '40px 40px'}}></div>

                    <div className="relative z-10 text-center px-6 max-w-5xl mx-auto pt-24">
                        {/* Available badge */}
                        <div className="inline-flex items-center gap-2.5 px-5 py-2.5 rounded-full bg-green-500/10 border border-green-500/20 text-green-400 text-sm font-semibold mb-10 hover:bg-green-500/15 transition-colors cursor-default">
                            <span className="relative flex h-2.5 w-2.5">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                            </span>
                            Available for new opportunities
                        </div>

                        <h1 className="text-6xl md:text-8xl font-black text-white mb-6 leading-none tracking-tight">
                            Hi, I'm{' '}
                            <span className="bg-gradient-to-r from-blue-400 via-indigo-400 to-violet-400 bg-clip-text text-transparent gradient-animate">
                                Megha
                            </span>
                        </h1>

                        <div className="text-2xl md:text-4xl font-bold text-gray-300 mb-6 h-12 flex items-center justify-center gap-3">
                            <span className="text-blue-400">{displayed}</span>
                            <span className="w-0.5 h-9 bg-blue-400 animate-pulse rounded-full"></span>
                        </div>

                        <p className="text-gray-500 text-lg md:text-xl max-w-2xl mx-auto mb-12 leading-relaxed font-light">
                            Crafting beautiful, performant, and accessible web experiences.
                            I transform complex ideas into elegant, user-centric digital products.
                        </p>

                        <div className="flex flex-col sm:flex-row gap-4 justify-center mb-16">
                            <a href="#projects"
                                className="group px-8 py-4 rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold text-lg hover:from-blue-400 hover:to-indigo-500 transition-all duration-300 shadow-xl shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-1 flex items-center justify-center gap-2">
                                View My Work
                                <i className="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                            </a>
                            <a href="#contact"
                                className="px-8 py-4 rounded-full border border-gray-700 text-gray-300 font-bold text-lg hover:border-blue-500/50 hover:text-blue-400 hover:bg-blue-500/5 transition-all duration-300 hover:-translate-y-1">
                                Get In Touch
                            </a>
                        </div>

                        {/* Social Icons */}
                        <div className="flex justify-center gap-4 mb-16">
                            {[
                                { icon: 'fab fa-github', href: 'https://github.com', label: 'GitHub' },
                                { icon: 'fab fa-linkedin', href: 'https://linkedin.com', label: 'LinkedIn' },
                                { icon: 'fab fa-twitter', href: 'https://twitter.com', label: 'Twitter' },
                                { icon: 'fas fa-envelope', href: 'mailto:megha@example.com', label: 'Email' },
                            ].map(s => (
                                <a key={s.icon} href={s.href} target="_blank" rel="noopener noreferrer" aria-label={s.label}
                                    className="w-12 h-12 rounded-xl flex items-center justify-center bg-gray-800/80 border border-gray-700/50 text-gray-400 hover:bg-blue-500/20 hover:border-blue-500/50 hover:text-blue-400 transition-all duration-300 hover:-translate-y-1 backdrop-blur-sm">
                                    <i className={`${s.icon} text-lg`}></i>
                                </a>
                            ))}
                        </div>

                        {/* Scroll indicator */}
                        <div className="flex flex-col items-center gap-2 text-gray-700">
                            <div className="w-6 h-10 border-2 border-gray-700 rounded-full flex justify-center pt-2">
                                <div className="w-1 h-2 bg-blue-400 rounded-full animate-bounce"></div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        // ─── ABOUT ───────────────────────────────────────────────────────────────
        function About() {
            const stats = [
                { label: 'Years Experience', value: '3+', icon: 'fa-calendar-alt' },
                { label: 'Projects Completed', value: '25+', icon: 'fa-rocket' },
                { label: 'Happy Clients', value: '15+', icon: 'fa-smile' },

            return (
                <section id="about" className="py-28 bg-gray-900 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-blue-500/50 to-transparent"></div>

                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-20">
                            <p className="text-blue-400 font-bold text-xs tracking-[0.3em] uppercase mb-4">Who I Am</p>
                            <h2 className="text-4xl md:text-5xl font-black text-white mb-4">
                                About <span className="text-blue-400">Me</span>
                            </h2>
                            <div className="w-16 h-1 bg-gradient-to-r from-blue-500 to-indigo-500 mx-auto rounded-full"></div>
                        </div>

                        <div className="grid md:grid-cols-2 gap-16 items-center">
                            {/* Avatar Card */}
                            <div className="flex justify-center">
                                <div className="relative float-anim">
                                    <div className="w-72 h-80 rounded-3xl bg-gradient-to-br from-gray-800 to-gray-900 border border-gray-700 flex flex-col items-center justify-center gap-4 shadow-2xl">
                                        <div className="w-28 h-28 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-xl shadow-blue-500/30">
                                            <i className="fas fa-user text-5xl text-white"></i>
                                        </div>
                                        <div className="text-center">
                                            <p className="text-white font-bold text-xl">Megha</p>
                                            <p className="text-blue-400 text-sm font-medium">Frontend Developer</p>
                                            <p className="text-gray-500 text-xs mt-1">Bengaluru, India</p>
                                        </div>
                                        <div className="flex gap-2">
                                            {['React', 'JS', 'CSS'].map(t => (
                                                <span key={t} className="px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-medium">{t}</span>
                                            ))}
                                        </div>
                                    </div>
                                    {/* Floating badges */}
                                    <div className="absolute -top-5 -right-5 w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-xl shadow-blue-500/40">
                                        <i className="fas fa-code text-2xl text-white"></i>
                                    </div>
                                    <div className="absolute -bottom-5 -left-5 w-14 h-14 rounded-2xl bg-gray-800 border border-gray-700 flex items-center justify-center shadow-xl">
                                        <i className="fab fa-react text-2xl text-blue-400 animate-spin" style={{animationDuration:'8s'}}></i>
                                    </div>
                                    <div className="absolute top-1/2 -right-8 w-12 h-12 rounded-xl bg-gray-800 border border-gray-700 flex items-center justify-center shadow-lg">
                                        <i className="fab fa-js-square text-xl text-yellow-400"></i>
                                    </div>
                                </div>
                            </div>

                            {/* Text Content */}
                            <div>
                                <h3 className="text-2xl font-bold text-white mb-5">
                                    Crafting Digital Experiences That Matter
                                </h3>
                                <div className="space-y-4 text-gray-400 leading-relaxed mb-8">
                                    <p>I'm a dedicated frontend developer with a passion for building web applications that are not just functional, but truly delightful to use. With 3+ years of industry experience, I specialize in React.js and modern JavaScript.</p>
                                    <p>My approach combines clean code principles with user-first design thinking. I'm always exploring the latest web technologies and best practices to deliver excellence in every project I touch.</p>
                                    <p>When I'm not coding, I contribute to open-source projects, write tech blogs, and mentor aspiring developers in my community.</p>
                                </div>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    {[
                                        { icon: 'fa-graduation-cap', label: 'B.Tech in CS', sub: 'VTU, 2021' },
                                        { icon: 'fa-briefcase', label: 'Currently at', sub: 'TechNova Solutions' },
                                        { icon: 'fa-map-marker-alt', label: 'Based in', sub: 'Bengaluru, India' },
                                        { icon: 'fa-language', label: 'Languages', sub: 'English, Kannada, Hindi' },
                                    ].map(item => (
                                        <div key={item.label} className="flex items-start gap-3 p-3 rounded-xl bg-gray-800/50 border border-gray-700/50">
                                            <div className="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center flex-shrink-0 mt-0.5">
                                                <i className={`fas ${item.icon} text-blue-400 text-sm`}></i>
                                            </div>
                                            <div>
                                                <p className="text-gray-500 text-xs">{item.label}</p>
                                                <p className="text-white text-sm font-medium">{item.sub}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <a href="#" className="inline-flex items-center gap-2 px-7 py-3.5 rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold hover:from-blue-400 hover:to-indigo-500 transition-all duration-300 hover:-translate-y-0.5 shadow-lg shadow-blue-500/25">
                                    <i className="fas fa-download"></i>
                                    Download Resume
                                </a>
                            </div>
                        </div>

                        {/* Stats Grid */}
                        <div className="mt-20 grid grid-cols-2 md:grid-cols-4 gap-5">
                            {stats.map(s => (
                                <div key={s.label} className="text-center p-6 rounded-2xl bg-gray-800/30 border border-gray-800 hover:border-blue-500/30 hover:bg-gray-800/60 transition-all duration-300 group cursor-default">
                                    <div className="w-12 h-12 rounded-xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-center mx-auto mb-4 group-hover:bg-blue-500/20 transition-colors">
                                        <i className={`fas ${s.icon} text-blue-400`}></i>
                                    </div>
                                    <div className="text-4xl font-black text-white mb-1 group-hover:text-blue-400 transition-colors">{s.value}</div>
                                    <div className="text-gray-500 text-sm">{s.label}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="absolute bottom-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-blue-500/50 to-transparent"></div>
                </section>
            );
        }

        // ─── SKILLS ──────────────────────────────────────────────────────────────
        function Skills() {
            const categories = [
                {
                    title: 'Frontend', icon: 'fa-laptop-code', color: 'from-blue-500 to-indigo-600',
                    skills: [
                        { name: 'React.js', level: 92 }, { name: 'JavaScript (ES6+)', level: 90 },
                        { name: 'HTML5 / CSS3', level: 95 }, { name: 'Tailwind CSS', level: 88 },
                        { name: 'TypeScript', level: 78 }, { name: 'Next.js', level: 75 },
                    ],
                },
                {
                    title: 'Backend', icon: 'fa-server', color: 'from-violet-500 to-purple-600',
                    skills: [
                        { name: 'Node.js', level: 72 }, { name: 'Express.js', level: 70 },
                        { name: 'MongoDB', level: 68 }, { name: 'REST APIs', level: 82 },
                        { name: 'Firebase', level: 75 }, { name: 'PostgreSQL', level: 60 },
                    ],
                },
                {
                    title: 'Tools & DevOps', icon: 'fa-tools', color: 'from-cyan-500 to-teal-600',
                    skills: [
                        { name: 'Git / GitHub', level: 91 }, { name: 'Figma (Design)', level: 80 },
                        { name: 'Jest / Testing', level: 72 }, { name: 'Docker (basics)', level: 58 },
                        { name: 'Webpack / Vite', level: 78 }, { name: 'Scrum / Agile', level: 85 },
                    ],
                },
            ];

            const techPills = ['React', 'JavaScript', 'TypeScript', 'Node.js', 'Tailwind CSS', 'Next.js',
                'MongoDB', 'Git', 'Figma', 'REST API', 'Firebase', 'Docker', 'Webpack', 'Jest'];

            return (
                <section id="skills" className="py-28 bg-gray-950 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-indigo-500/50 to-transparent"></div>

                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-20">
                            <p className="text-blue-400 font-bold text-xs tracking-[0.3em] uppercase mb-4">What I Know</p>
                            <h2 className="text-4xl md:text-5xl font-black text-white mb-4">
                                Technical <span className="text-blue-400">Skills</span>
                            </h2>
                            <div className="w-16 h-1 bg-gradient-to-r from-blue-500 to-indigo-500 mx-auto rounded-full"></div>
                        </div>

                        <div className="grid md:grid-cols-3 gap-8">
                            {categories.map(cat => (
                                <div key={cat.title} className="bg-gray-900/80 rounded-2xl p-8 border border-gray-800 hover:border-gray-700 transition-all duration-300 hover:-translate-y-1 group">

                                                <div className="flex justify-between text-sm mb-2">
                                                    <span className="text-gray-300 font-medium">{skill.name}</span>
                                                    <span className="text-blue-400 font-bold">{skill.level}%</span>
                                                </div>
                                                <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden">
                                                    <div className={`h-full rounded-full bg-gradient-to-r ${cat.color} skill-bar`}

                                                </div>
                                            </div>

                            {techPills.map(tech => (
                                <span key={tech}
                                    className="px-5 py-2 rounded-full bg-gray-800/80 border border-gray-700/50 text-gray-400 text-sm font-medium hover:bg-blue-500/10 hover:border-blue-500/40 hover:text-blue-300 transition-all duration-300 cursor-default">
                                    {tech}
                                </span>

                    <div className="absolute bottom-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-indigo-500/50 to-transparent"></div>
                </section>

        // ─── CONTACT ─────────────────────────────────────────────────────────────
        function Contact() {
            const [form, setForm] = useState({ name: '', email: '', subject: '', message: '' });
            const [sent, setSent] = useState(false);
            const [loading, setLoading] = useState(false);

            const handle = e => setForm({ ...form, [e.target.name]: e.target.value });

            const submit = e => {
                e.preventDefault();
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    setSent(true);
                    setForm({ name: '', email: '', subject: '', message: '' });
                    setTimeout(() => setSent(false), 5000);
                }, 1500);
            };

            const info = [
                { icon: 'fa-envelope', label: 'Email', value: 'megha@example.com', href: 'mailto:megha@example.com', color: 'from-blue-500 to-indigo-600' },
                { icon: 'fa-phone', label: 'Phone', value: '+91 98765 43210', href: 'tel:+919876543210', color: 'from-violet-500 to-purple-600' },
                { icon: 'fa-map-marker-alt', label: 'Location', value: 'Bengaluru, Karnataka, India', href: '#', color: 'from-cyan-500 to-teal-600' },
            ];

            return (
                <section id="contact" className="py-28 bg-gray-900 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-blue-500/50 to-transparent"></div>

                                <div>
                                    <h3 className="text-2xl font-bold text-white mb-3">Let's build something great together!</h3>
                                    <p className="text-gray-500 leading-relaxed">I'm currently open to exciting opportunities. Whether it's a project, collaboration, or just a chat — my inbox is always open.</p>
                                </div>

                                {info.map(i => (
                                    <a key={i.label} href={i.href}
                                        className="flex items-center gap-4 p-4 rounded-2xl bg-gray-800/40 border border-gray-700/50 hover:border-gray-600 hover:bg-gray-800/70 transition-all duration-300 group">

                                            <i className={`fas ${i.icon}`}></i>
                                        </div>
                                        <div>
                                            <p className="text-gray-500 text-xs font-medium">{i.label}</p>
                                            <p className="text-white font-semibold text-sm group-hover:text-blue-400 transition-colors">{i.value}</p>
                                        </div>
                                    </a>
                                ))}

                                {/* Socials */}
                                <div className="pt-2">
                                    <p className="text-gray-500 text-sm mb-4">Find me on social media</p>
                                    <div className="flex gap-3">
                                        {[
                                            { icon: 'fab fa-github', href: '#', label: 'GitHub' },
                                            { icon: 'fab fa-linkedin', href: '#', label: 'LinkedIn' },
                                            { icon: 'fab fa-twitter', href: '#', label: 'Twitter' },
                                            { icon: 'fab fa-instagram', href: '#', label: 'Instagram' },
                                        ].map(s => (
                                            <a key={s.icon} href={s.href} aria-label={s.label}
                                                className="w-11 h-11 rounded-xl bg-gray-800 border border-gray-700 flex items-center justify-center text-gray-400 hover:bg-blue-500/20 hover:border-blue-500/50 hover:text-blue-400 transition-all duration-300 hover:-translate-y-0.5">
                                                <i className={s.icon}></i>
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Form */}
                            <form onSubmit={submit} className="md:col-span-3 bg-gray-800/30 border border-gray-700/50 rounded-2xl p-8 space-y-5 backdrop-blur-sm">
                                {sent && (
                                    <div className="bg-green-500/10 border border-green-500/30 text-green-400 rounded-xl p-4 text-sm flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-full bg-green-500/20 flex items-center justify-center flex-shrink-0">
                                            <i className="fas fa-check"></i>
                                        </div>
                                        <div>
                                            <p className="font-bold">Message sent successfully!</p>
                                            <p className="text-green-500/70 text-xs mt-0.5">I'll get back to you within 24 hours.</p>
                                        </div>
                                    </div>
                                )}

                                <div className="grid sm:grid-cols-2 gap-5">
                                    {[
                                        { name: 'name', label: 'Full Name', type: 'text', placeholder: 'John Doe' },
                                        { name: 'email', label: 'Email Address', type: 'email', placeholder: 'john@example.com' },
                                    ].map(f => (
                                        <div key={f.name}>
                                            <label className="block text-gray-400 text-sm font-medium mb-2">{f.label}</label>
                                            <input name={f.name} type={f.type} value={form[f.name]} onChange={handle} required placeholder={f.placeholder}
                                                className="w-full px-4 py-3 rounded-xl bg-gray-900/80 border border-gray-700 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 focus:bg-gray-900 transition-all text-sm" />
                                        </div>
                                    ))}
                                </div>

                                <div>
                                    <label className="block text-gray-400 text-sm font-medium mb-2">Subject</label>
                                    <input name="subject" value={form.subject} onChange={handle} placeholder="What's this about?"
                                        className="w-full px-4 py-3 rounded-xl bg-gray-900/80 border border-gray-700 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 focus:bg-gray-900 transition-all text-sm" />
                                </div>

                                <div>
                                    <label className="block text-gray-400 text-sm font-medium mb-2">Message</label>
                                    <textarea name="message" value={form.message} onChange={handle} required rows={6}
                                        placeholder="Tell me about your project, idea, or just say hello..."
                                        className="w-full px-4 py-3 rounded-xl bg-gray-900/80 border border-gray-700 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 focus:bg-gray-900 transition-all resize-none text-sm"></textarea>
                                </div>

                                <button type="submit" disabled={loading}
                                    className="w-full px-6 py-4 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold hover:from-blue-400 hover:to-indigo-500 transition-all duration-300 shadow-lg shadow-blue-500/20 hover:shadow-blue-500/40 hover:-translate-y-0.5 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0">
                                    {loading ? (
                                        <>
                                            <i className="fas fa-spinner animate-spin"></i> Sending...
                                        </>
                                    ) : (
                                        <>
                                            <i className="fas fa-paper-plane"></i> Send Message
                                        </>
                                    )}
                                </button>
                            </form>
                        </div>
                    </div>

                    <div className="absolute bottom-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-blue-500/50 to-transparent"></div>
                </section>
            );
        }

                                            {item.text}

                                    ))}

                        <div className="pt-8 border-t border-gray-800/60 flex flex-col md:flex-row items-center justify-between gap-4 text-center">

                                © {year} <span className="text-gray-500">Megha</span>. All rights reserved.
                            </p>
                            <p className="text-gray-600 text-sm">
                                Crafted with <span className="text-red-400 animate-pulse">♥</span> using{' '}
                                <span className="text-blue-500">React</span> &{' '}
                                <span className="text-cyan-500">Tailwind CSS</span>

                                <i className="fas fa-arrow-up text-sm"></i>
                            </a>

                    </div>

        // ─── APP ─────────────────────────────────────────────────────────────────
        function App() {
            return (
                <div className="min-h-screen bg-gray-950">
